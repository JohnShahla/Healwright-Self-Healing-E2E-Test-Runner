<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme Store</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 40px; max-width: 520px; color: #1a1a1a; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 24px; }
      .price { font-size: 20px; color: #555; }
      button { font-size: 16px; padding: 10px 18px; border: 0; border-radius: 8px; background: #2d6cdf; color: #fff; cursor: pointer; }
      #status { margin-top: 16px; min-height: 24px; color: #0a7d28; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Acme Store</h1>
    <!-- v1: the "Add to cart" button is found by its data-testid. -->
    <div class="card">
      <h2>Blue Hoodie</h2>
      <p class="price">$49.00</p>
      <button data-testid="add-cart" class="add" onclick="addToCart()">Add to cart</button>
    </div>
    <div id="status" role="status" aria-live="polite"></div>
    <script>
      function addToCart() {
        document.getElementById('status').textContent = 'Added to cart';
      }
    </script>
  </body>
</html>
